name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build and verify release integrity artifacts but skip publishing (GitHub Release, container image push)"
        type: boolean
        default: false
        required: false

permissions:
  contents: read

concurrency:
  group: release-artifacts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux-x64
          - runner: macos-14
            platform: macos-arm64
          - runner: windows-2022
            platform: windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive reproducible metadata timestamp
        id: source-date
        shell: bash
        run: |
          epoch="$(git show -s --format=%ct "$GITHUB_SHA")"
          echo "epoch=$epoch" >> "$GITHUB_OUTPUT"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install VS Code extension dependencies
        shell: bash
        run: |
          cd tools/vscode
          npm ci

      - name: Build and package CLI artifact
        shell: bash
        run: |
          ./scripts/package_cli_artifacts.sh --platform "${{ matrix.platform }}" --release

      - name: Build and package AOT artifact
        shell: bash
        run: |
          ./scripts/package_aot_artifact.sh --platform "${{ matrix.platform }}" --release --manifest-path .

      - name: Build and package VSIX artifact
        shell: bash
        run: |
          ./scripts/package_vscode_extension.sh --platform "${{ matrix.platform }}" --release --skip-build

      - name: Generate checksums and metadata
        env:
          SOURCE_DATE_EPOCH: ${{ steps.source-date.outputs.epoch }}
        shell: bash
        run: |
          ./scripts/generate_release_checksums.sh

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            dist/fuse-cli-${{ matrix.platform }}.*
            dist/fuse-aot-${{ matrix.platform }}.*
            dist/fuse-vscode-${{ matrix.platform }}.vsix
            dist/SHA256SUMS
            dist/release-artifacts.json
          if-no-files-found: error

  aggregate:
    name: Aggregate Integrity Bundle
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: package
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Derive reproducible metadata timestamp
        id: source-date
        shell: bash
        run: |
          epoch="$(git show -s --format=%ct "$GITHUB_SHA")"
          echo "epoch=$epoch" >> "$GITHUB_OUTPUT"

      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: tmp/release-artifacts

      - name: Build and verify merged release integrity bundle
        env:
          DRY_RUN: ${{ inputs.dry_run == true && 'true' || 'false' }}
          SOURCE_DATE_EPOCH: ${{ steps.source-date.outputs.epoch }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find tmp/release-artifacts -type f \( -name 'fuse-cli-*' -o -name 'fuse-aot-*' -o -name 'fuse-vscode-*.vsix' \) -exec cp {} dist/ \;
          ./scripts/generate_release_checksums.sh --dist dist --output dist/SHA256SUMS --metadata dist/release-artifacts.json
          ./scripts/generate_release_sboms.sh --dist dist --output-dir dist
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "$DRY_RUN" != "true" ]]; then
            ./scripts/generate_release_provenance.sh \
              --dist dist \
              --output dist/release-provenance.json \
              --repository "${GITHUB_REPOSITORY}" \
              --ref "${GITHUB_REF}" \
              --tag "${GITHUB_REF_NAME}" \
              --sha "${GITHUB_SHA}" \
              --workflow-name "${GITHUB_WORKFLOW}" \
              --workflow-path ".github/workflows/release-artifacts.yml" \
              --workflow-ref "${GITHUB_REF}" \
              --event "${GITHUB_EVENT_NAME}" \
              --actor "${GITHUB_ACTOR}" \
              --run-id "${GITHUB_RUN_ID}" \
              --run-attempt "${GITHUB_RUN_ATTEMPT}"
          fi
          ./scripts/sign_release_manifest.sh \
            --input dist/SHA256SUMS \
            --signature dist/SHA256SUMS.sig \
            --certificate dist/SHA256SUMS.pem
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "$DRY_RUN" != "true" ]]; then
            ./scripts/sign_release_manifest.sh \
              --input dist/release-provenance.json \
              --signature dist/release-provenance.sig \
              --certificate dist/release-provenance.pem
          fi
          ./scripts/generate_release_checksums.sh --dist dist --output dist/SHA256SUMS --metadata dist/release-artifacts.json
          verify_args=(
            --dist dist
            --repository "${GITHUB_REPOSITORY}"
            --workflow-name "${GITHUB_WORKFLOW}"
            --workflow-path ".github/workflows/release-artifacts.yml"
            --workflow-ref "${GITHUB_REF}"
            --expected-ref "${GITHUB_REF}"
            --require-signatures
          )
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "$DRY_RUN" != "true" ]]; then
            verify_args+=(--require-provenance --expected-tag "${GITHUB_REF_NAME}" --expected-sha "${GITHUB_SHA}")
          fi
          ./scripts/verify_release_integrity.sh "${verify_args[@]}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            ./scripts/generate_release_notes.sh --version "${GITHUB_REF_NAME#v}" --tag "${GITHUB_REF_NAME}" --output dist/RELEASE_NOTES.md
          else
            ./scripts/generate_release_notes.sh --output dist/RELEASE_NOTES.md
          fi
          {
            echo "## Release Artifact Checksums"
            echo
            echo '```txt'
            cat dist/SHA256SUMS
            echo '```'
            echo
            echo "## Integrity Outputs"
            echo
            ls -1 dist/*.spdx.json dist/SHA256SUMS.sig dist/SHA256SUMS.pem 2>/dev/null | sed 's#^#- `#; s#$#`#'
            if [[ -f dist/release-provenance.json ]]; then
              printf '%s\n' \
                '- `dist/release-provenance.json`' \
                '- `dist/release-provenance.sig`' \
                '- `dist/release-provenance.pem`'
            else
              echo "- provenance skipped (requires tagged publish run)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dry-run notice
        if: inputs.dry_run
        shell: bash
        run: |
          {
            echo "## Dry Run"
            echo
            echo "Artifacts, signatures, and SBOMs were built and verified successfully."
            echo "Publishing (GitHub Release and container image push) was **skipped** because \`dry_run\` is enabled."
            echo
            echo "Release provenance generation is gated to tagged publish runs and was skipped for this dry-run."
            echo
            echo "To publish, re-run this workflow with \`dry_run\` unchecked, or push the release tag."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: |
            dist/fuse-cli-*
            dist/fuse-aot-*
            dist/fuse-vscode-*.vsix
            dist/SHA256SUMS
            dist/SHA256SUMS.sig
            dist/SHA256SUMS.pem
            dist/release-artifacts.json
            dist/*.spdx.json
            dist/release-provenance.json
            dist/release-provenance.sig
            dist/release-provenance.pem
            dist/RELEASE_NOTES.md
          if-no-files-found: error

  publish-container:
    name: Publish Reference AOT Container
    if: startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: aggregate
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: tmp/release-bundle

      - name: Authenticate to GHCR
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

      - name: Build and publish reference AOT image from release artifact
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/fuse-aot-demo
        shell: bash
        run: |
          chmod +x ./scripts/package_aot_container_image.sh
          ./scripts/package_aot_container_image.sh \
            --archive tmp/release-bundle/fuse-aot-linux-x64.tar.gz \
            --image "$IMAGE" \
            --tag "${GITHUB_REF_NAME}" \
            --tag "${GITHUB_SHA}" \
            --push
          {
            echo "## Published Reference Container"
            echo
            echo "- \`${IMAGE}:${GITHUB_REF_NAME}\`"
            echo "- \`${IMAGE}:${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: aggregate
    permissions:
      contents: write

    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: tmp/release-bundle

      - name: Publish release from generated assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: tmp/release-bundle/RELEASE_NOTES.md
          files: |
            tmp/release-bundle/fuse-cli-*
            tmp/release-bundle/fuse-aot-*
            tmp/release-bundle/fuse-vscode-*.vsix
            tmp/release-bundle/SHA256SUMS
            tmp/release-bundle/SHA256SUMS.sig
            tmp/release-bundle/SHA256SUMS.pem
            tmp/release-bundle/release-artifacts.json
            tmp/release-bundle/*.spdx.json
            tmp/release-bundle/release-provenance.json
            tmp/release-bundle/release-provenance.sig
            tmp/release-bundle/release-provenance.pem
          fail_on_unmatched_files: true
          generate_release_notes: false
          draft: false
          prerelease: false

  verify-published:
    name: Verify Published Release Assets
    if: startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: publish
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Download published assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p tmp/published-assets
          gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --dir tmp/published-assets --clobber
          ls -la tmp/published-assets

      - name: Validate published release integrity
        shell: bash
        run: |
          ./scripts/verify_release_integrity.sh \
            --dist tmp/published-assets \
            --repository "${GITHUB_REPOSITORY}" \
            --workflow-name "${GITHUB_WORKFLOW}" \
            --workflow-path ".github/workflows/release-artifacts.yml" \
            --workflow-ref "${GITHUB_REF}" \
            --expected-ref "${GITHUB_REF}" \
            --expected-tag "${GITHUB_REF_NAME}" \
            --expected-sha "${GITHUB_SHA}" \
            --require-signatures \
            --require-provenance
